<app-profile-layout>

  <h1 class="text-center">Mes lieux de charge</h1>

  <div class="flex justify-end mt-6">
    <a [routerLink]="['/profil/lieux/nouveau']" class="underline text-sm">
      Ajouter un lieu de charge
    </a>
  </div>

  <div *ngIf="locations.length === 0" class="text-center mt-10 text-gray-600">
    Aucun lieu de charge pour le moment.
  </div>

  <div
    *ngIf="locations.length > 0"
    class="grid gap-6 md:grid-cols-3 mt-6 auto-rows-fr"
  >

    <article
      *ngFor="let loc of locations"
      class="cards p-5 rounded-sm leading-8 flex flex-col"
    >

      <div>
        <h2 class="font-bold">
          {{ loc.nickname || 'Lieu de charge' }}
        </h2>

        <p class="text-sm text-gray-700">
          {{ loc.address }}
        </p>

        <p class="text-sm text-gray-700">
          {{ loc.postalCode }} {{ loc.cityName }}
        </p>
      </div>

      <div class="mt-auto pt-4 flex justify-between items-center">
        <a
          [routerLink]="['/profil', 'lieux', loc.locationId]"
          class="underline text-sm"
        >
          Voir les détails
        </a>

        <a
          [routerLink]="['/profil', 'lieux', loc.locationId, 'bornes']"
          class="underline text-sm"
        >
          Voir les bornes
        </a>
      </div>

    </article>

  </div>

</app-profile-layout>
